name: site

size: S

build:
  flavor: none

type: ruby:2.7

variables:
  env:
    JEKYLL_ENV: production

web:
  locations:
    '/':
      root: '_site'
      index:
        - index.html
      passthru: '/404/index.html'
      expires: 5m
      scripts: false
      rules:
        '\.(js|css|jpe?g|png|gif|ico|svg)$':
          expires: 10m

hooks:
  build: |
    set -xe
    gem install bundler
    bundle install
    ls -l ./vendor/bundle/bin || true
    ls -l ./vendor/bin || true
    find . -name jekyll || true
    echo "$PATH"
    jekyll build
    command -v platform >/dev/null || curl -sfS https://platform.sh/cli/installer | php

crons:
  # Automatically redeploy master every month.
  redeploy:
    spec: '0 0 1 * *'
    cmd: |
      if [ "$PLATFORM_BRANCH" = master ]; then
        platform redeploy --yes --no-wait
      fi
